<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-wrapper {
      width: 420px;
      height: 620px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #4f63d2;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header .info h2 { font-size: 16px; font-weight: 600; }
    .chat-header .info p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .status-dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-row.agent .bubble {
      background: #f1f3f9;
      color: #1e1e1e;
      border-bottom-left-radius: 4px;
    }
    .bubble-row.user .bubble {
      background: #4f63d2;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #e0e4f7;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .thinking .bubble {
      font-style: italic;
      color: #999;
    }

    /* Input area */
    .chat-input {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      border: 1.5px solid #dde1f0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input input:focus { border-color: #4f63d2; }

    .chat-input button {
      background: #4f63d2;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .chat-input button:hover { background: #3a4db5; }
    .chat-input button:disabled { background: #aaa; cursor: not-allowed; }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #dde1f0; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="info">
        <h2>Local AI Agent</h2>
        <p><span class="status-dot"></span>Online &mdash; Weather &amp; Calculator</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <!-- welcome message added by JS -->
    </div>

    <div class="chat-input">
      <input
        type="text"
        id="userInput"
        placeholder='Try: "weather in London" or "5 * 3"'
        autocomplete="off"
      />
      <button id="sendBtn" title="Send">&#9658;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const input      = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");

    const WELCOME = "Hey! 👋 I'm your local AI agent.\n\nI can help with:\n• 🌤 Weather — e.g. \"weather in London\"\n• 🔢 Calculator (+, -, *) — e.g. \"5+2\" or \"10 - 3\"";

    function addBubble(text, role, extraClass = "") {
      const row    = document.createElement("div");
      row.className = `bubble-row ${role} ${extraClass}`;

      const avatar = document.createElement("div");
      avatar.className = "bubble-avatar";
      avatar.textContent = role === "agent" ? "🤖" : "🧑";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    // Show welcome
    addBubble(WELCOME, "agent");

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addBubble(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      // Thinking indicator
      const thinkRow = addBubble("...", "agent", "thinking");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        thinkRow.remove();
        addBubble(data.reply || "No response.", "agent");
      } catch (err) {
        thinkRow.remove();
        addBubble("Error reaching the agent. Make sure app.py is running.", "agent");
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
